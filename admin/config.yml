# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: johanwahyus/Profile
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/32e27a9d-8eb8-4a07-92ac-ef6c2b1f26b8/pkce
  auth_token_endpoint: /sites/32e27a9d-8eb8-4a07-92ac-ef6c2b1f26b8/token
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url
# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
# Add site links in Decap CMS (optional)
site_url: https://johanwahyus.netlify.app

# Tempat gambar yang diupload lewat CMS akan disimpan di repo
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "data"
    label: "Konten Website"
    files:
      - file: "content/data.json"
        label: "Semua Konten"
        name: "data"
        fields:

          - label: "Hero (Bagian Paling Atas)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Label kecil di atas nama", name: "eyebrow", widget: "string" }
              - { label: "Nama (baris 1)", name: "name_line1", widget: "string" }
              - { label: "Nama (baris 2)", name: "name_line2", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }

          - label: "Tentang Saya"
            name: "about"
            widget: "object"
            fields:
              - { label: "Foto Profil", name: "photo", widget: "image" }
              - { label: "Paragraf 1", name: "text1", widget: "text" }
              - { label: "Paragraf 2", name: "text2", widget: "text" }

          - label: "CV"
            name: "cv"
            widget: "object"
            fields:
              - label: "Pengalaman Kerja"
                name: "experience"
                widget: "list"
                fields:
                  - { label: "Periode", name: "date", widget: "string" }
                  - { label: "Judul / Jabatan", name: "title", widget: "string" }
                  - { label: "Deskripsi", name: "desc", widget: "text" }
              - label: "Pendidikan"
                name: "education"
                widget: "list"
                fields:
                  - { label: "Periode / Label", name: "date", widget: "string" }
                  - { label: "Nama Sekolah/Kampus", name: "title", widget: "string" }
                  - { label: "Deskripsi", name: "desc", widget: "text" }
              - { label: "Catatan Sertifikat", name: "cert_note", widget: "string" }

          - label: "Keahlian"
            name: "skills"
            widget: "object"
            fields:
              - label: "Coding & Tools"
                name: "tools"
                widget: "list"
                field: { label: "Skill", name: "item", widget: "string" }
              - label: "Bahasa"
                name: "languages"
                widget: "list"
                field: { label: "Bahasa", name: "item", widget: "string" }

          - label: "Portfolio (Galeri Editing Foto)"
            name: "portfolio"
            widget: "list"
            fields:
              - { label: "Gambar", name: "image", widget: "image" }
              - { label: "Judul Karya", name: "caption", widget: "string" }

          - label: "Blog"
            name: "blog"
            widget: "object"
            fields:
              - label: "Tag/Kategori"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "item", widget: "string" }
              - label: "Daftar Tulisan"
                name: "posts"
                widget: "list"
                fields:
                  - { label: "Teks/Judul Tulisan", name: "caption", widget: "text" }

          - label: "Kontak"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Link GitHub", name: "github", widget: "string", required: false }
              - { label: "Teks GitHub yang ditampilkan", name: "github_label", widget: "string", required: false }
              - { label: "Link Instagram", name: "instagram", widget: "string", required: false }
              - { label: "Teks Instagram yang ditampilkan", name: "instagram_label", widget: "string", required: false }
              - { label: "Link LinkedIn (kosongkan jika belum ada)", name: "linkedin", widget: "string", required: false }
              - { label: "Teks LinkedIn yang ditampilkan", name: "linkedin_label", widget: "string", required: false }
              